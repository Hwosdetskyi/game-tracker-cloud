version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: game_tracker
    command: --default-authentication-plugin=mysql_native_password --skip-log-bin

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: game_tracker
      DB_USER: root
      DB_PASSWORD: rootpass
    volumes:
      - ./backend:/var/www/html

  frontend:
      build: ./frontend
      ports:
        - "3000:80"
      depends_on:
        - backend
      environment:
        - REACT_APP_API_URL=/api