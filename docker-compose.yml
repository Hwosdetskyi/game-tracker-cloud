version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: game_tracker
    volumes:
      - db-data:/var/lib/mysql
      - ./db-init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: game_tracker
      DB_USER: root
      DB_PASSWORD: rootpass
    volumes:
      - ./backend:/var/www/html

  frontend:
      build: ./frontend
      ports:
        - "3000:80"
      depends_on:
        - backend
      environment:
        - REACT_APP_API_URL=/api

volumes:
  db-data:
